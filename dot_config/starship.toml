##
# Starship Prompt Configuration
#
# Largely based on this preset: <https://starship.rs/presets/tokyo-night>.
##
format = """
[░▒▓](#a3aed2)\
[ $os$shell ](bg:#a3aed2 fg:#090c0c)\
[](bg:#6f51c0 fg:#a3aed2)\
$username\
$hostname\
[](bg:#769ff0 fg:#6f51c0)\
$directory\
[](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
$git_metrics\
[](fg:#394260 bg:#212736)\
$time\
[](fg:#212736 bg:#1d2230)\
$cmd_duration\
[ ](fg:#1d2230)\
\n$character"""


# Git seems to run a bit too slow on my work laptop for the default (500 milliseconds).
command_timeout = 2000


[os]
disabled = false
format = "$symbol"
style = "bold"

[os.symbols]
Macos = ""

[hostname]
ssh_only = false
format = "[@$hostname ](fg:#f0ebff bg:#6f51c0)"
style = "bg:#6f51c0"

[directory]
format = "[ $path ]($style)"
style = "fg:#e3e5e5 bg:#769ff0"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'
style = "bg:#394260"

[git_status]
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'
style = "bg:#394260"

[git_metrics]
# Enable this module (it's disabled by default).
disabled = false
format = '([+$added ]($added_style)[-$deleted ]($deleted_style))'
added_style = "fg:green bg:#394260"
deleted_style = "fg:red bg:#394260"

[time]
# Enable this module (it's disabled by default).
disabled = false
time_format = "%R"
format = '[[  $time ](fg:#a0a9cb bg:#212736)]($style)'
style = "bg:#212736"

[cmd_duration]
# Always display command duration.
min_time = 0
format = "[\ueba2 $duration]($style)"
style = "bg:#1d2230"
show_milliseconds = true
# Desktop notifications are handled by nushell hooks (ntfy-nu-hooks.nu)
# which provide better focus detection and session-specific notifications.
show_notifications = false
# min_time_to_notify = 45_000

[shell]
disabled = false
format = " $indicator"
style = "fg:#090c0c bg:#a3aed2"

[username]
show_always = true
style_user = "fg:#f0ebff bg:#6f51c0"
style_root = "bold fg:#ff8da3 bg:#6f51c0"
format = "[ $user]($style)"
disabled = false
