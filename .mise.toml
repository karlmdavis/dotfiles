# Mise configuration for dotfiles repository
# Task runner for linting and testing

[tools]
shellcheck = "latest"
bats = "latest"
# Note: nushell is provided by system installation

[tasks.lint]
description = "Run shellcheck on managed bash scripts"
run = """
echo "Running shellcheck..."
shellcheck \
  private_dot_local/bin/executable_cmd-notify \
  .chezmoiscripts/run_install_rustup.sh

echo "✓ Shellcheck passed!"
"""

[tasks.test]
description = "Run unit tests"
run = """
echo "Running unit tests..."
bats test/cmd-notify/ test/claude/
"""

[tasks.ci]
description = "Run complete CI suite (lint + test in parallel)"
run = """
mise run lint &
LINT_PID=$!
mise run test &
TEST_PID=$!

wait $LINT_PID
LINT_EXIT=$?

wait $TEST_PID
TEST_EXIT=$?

if [ $LINT_EXIT -ne 0 ] || [ $TEST_EXIT -ne 0 ]; then
  echo ""
  echo "❌ CI failed!"
  exit 1
fi

echo ""
echo "✓ All CI checks passed!"
"""

[tasks.install-hooks]
description = "Install git pre-commit hooks"
run = """
git config core.hooksPath .githooks
chmod +x .githooks/pre-commit
echo "✓ Git hooks installed. Pre-commit will run lint + test."
"""
