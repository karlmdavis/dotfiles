# Mise configuration for dotfiles repository
# Task runner for linting and testing

# Treat this repo as a mise monorepo so embedded mini-projects can carry their own mise.toml and be
# driven from here via `//<path>:<task>`. `experimental` is required for the monorepo feature and
# is set in-file so bare `mise run` (and the pre-commit hook) work without MISE_EXPERIMENTAL=1.
experimental_monorepo_root = true

[settings]
experimental = true

[monorepo]
# Subprojects with their own mise.toml. Single-level globs only (no `**`).
config_roots = [
  "private_dot_local/lib/aerospace-workspaces",
  "private_dot_local/lib/cmd-notify",
]

[tools]
shellcheck = "latest"
bats = "latest"
# Note: nushell is provided by system installation

[tasks.lint]
description = "Run shellcheck on managed bash scripts"
run = """
echo "Running shellcheck..."
shellcheck \
  .chezmoiscripts/run_onchange_install_rustup.sh

echo "✓ Shellcheck passed!"
"""

[tasks.test]
description = "Run unit tests"
run = """
echo "Running unit tests..."
bats test/claude/
mise run '//private_dot_local/lib/aerospace-workspaces:test'
mise run '//private_dot_local/lib/cmd-notify:test'
"""

[tasks.ci]
description = "Run complete CI suite (lint + test in parallel)"
run = """
mise run lint &
LINT_PID=$!
mise run test &
TEST_PID=$!

wait $LINT_PID
LINT_EXIT=$?

wait $TEST_PID
TEST_EXIT=$?

if [ $LINT_EXIT -ne 0 ] || [ $TEST_EXIT -ne 0 ]; then
  echo ""
  echo "❌ CI failed!"
  exit 1
fi

echo ""
echo "✓ All CI checks passed!"
"""

[tasks.install-hooks]
description = "Install git pre-commit hooks"
run = """
git config core.hooksPath .githooks
chmod +x .githooks/pre-commit
echo "✓ Git hooks installed. Pre-commit will run lint + test."
"""
